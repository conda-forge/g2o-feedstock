{% set name = "g2o" %}
{% set version = "20241228_git" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  - url: https://github.com/RainerKuemmerle/g2o/archive/fcba4eaca6f20d9a5792404cc8ef303aeb8ba5d2.zip
    sha256: 8babb832062219dbc8897a8092e7aa12eb1101498d5484d688f24221479b0629

build:
  number: 0
  skip: true  # [osx or win and vc<14]
  run_exports:
    - {{ pin_subpackage(name, max_pin='x.x.x') }}

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - ninja
    - cmake
    - pkg-config
  host:
    - eigen
    - suitesparse
  run:
    - suitesparse

test:
  commands:
    - g2o --help

about:
  home: https://github.com/RainerKuemmerle/g2o
  license: LGPL-3.0-or-later
  license_file: doc/license-lgpl.txt
  summary: |
    g2o - General Graph Optimization
  dev_url: https://github.com/RainerKuemmerle/g2o
  doc_url: https://openslam-org.github.io/g2o.html

extra:
  recipe-maintainers:
    - seanyen
